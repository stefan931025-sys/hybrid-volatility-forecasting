name: Quantamental Pipeline Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1-5' # Runs at 06:00 UTC (08:00 AM SAST) Monday through Friday

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v3

      - name: Configure Cloud Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Quant & Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas yfinance scipy requests

      - name: Execute Automated Ingestion & Analytics Engine
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: |
          python run_pipeline.py
          python publish_linkedin.py
